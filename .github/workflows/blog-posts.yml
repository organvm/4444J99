name: Blog Post Feed

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6am UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://organvm-v-logos.github.io/public-process/feed.xml"
          max_post_count: 5
          template: "- [$title]($url)"
          commit_message: "chore: update essay feed in README [skip ci]"
