name: Ecosystem Stats Sync

on:
  push:
    branches: [main]
    paths:
      - "data/ecosystem.yml"
      - "README.md"
      - "scripts/sync-readme.py"
      - ".github/workflows/ecosystem-stats.yml"
  pull_request:
    paths:
      - "data/ecosystem.yml"
      - "README.md"
      - "scripts/sync-readme.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Verify (pull requests)
        if: github.event_name == 'pull_request'
        run: |
          python3 scripts/test_sync_readme.py
          python3 scripts/sync-readme.py --check

      - name: Sync, test, and commit (push / manual)
        if: github.event_name != 'pull_request'
        run: |
          # Sync first so the in-sync guard test passes on the exact drift it repairs.
          python3 scripts/sync-readme.py
          python3 scripts/test_sync_readme.py
          if ! git diff --quiet README.md; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "chore: sync ecosystem stats in README [skip ci]"
            git push
          fi
